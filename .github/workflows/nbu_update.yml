name: NBU Dashboard — обновление данных

on:
  schedule:
    # UTC времена для Ташкента UTC+5: 9:00=4:00, 12:00=7:00, 15:00=10:00, 18:00=13:00
    - cron: '0 4 * * 1-5'   # 09:00 Ташкент (пн-пт)
    - cron: '0 7 * * 1-5'   # 12:00 Ташкент
    - cron: '0 10 * * 1-5'  # 15:00 Ташкент
    - cron: '0 13 * * 1-5'  # 18:00 Ташкент
  workflow_dispatch:          # ручной запуск из GitHub UI

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests pandas gspread google-auth google-auth-httplib2

      - name: Write service account key
        env:
          SA_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python3 -c "import os,json; d=os.environ['SA_JSON']; json.loads(d); open('/tmp/service_account.json','w').write(d)"
          echo "✅ Service account JSON validated"


      - name: Run pipeline
        env:
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          SHEET_ID: '1zXNvio8ti1tpU4HkuROE9tzzPSQzLBCy_0gxvb7CYR0'
          KEY_FILE: '/tmp/service_account.json'
        run: |
          python pipeline/run_all.py
